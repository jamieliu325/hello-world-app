version: '3.8'

services:
  backend:
    build: ./backend
    container_name: hello-backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: hello-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend